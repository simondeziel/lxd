name: Install Trivy
description: Installs Trivy via pinned Docker image

runs:
  using: composite
  steps:
    - name: Resolve Trivy image reference
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Read the pinned image reference from the Dockerfile - single source of truth managed by Dependabot.
        TRIVY_IMAGE=$(awk '/^FROM/{print $2}' "${ACTION_PATH}/Dockerfile")
        echo "TRIVY_IMAGE=${TRIVY_IMAGE}" >> "$GITHUB_ENV"

    - name: Verify Trivy image signature
      shell: bash
      run: |
        # Verify the image was signed by Aqua's own CI pipeline via Sigstore keyless signing.
        # This proves provenance beyond the digest alone (which only guarantees content integrity).
        cosign verify \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          --certificate-identity-regexp "https://github.com/aquasecurity/trivy/.github/workflows/" \
          "${TRIVY_IMAGE}"

    - name: Setup Trivy Docker Wrapper
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Ensure the host cache directory exists
        mkdir -p /home/runner/vuln-cache

        # Install the wrapper, substituting ${TRIVY_IMAGE} while leaving all other
        # shell variables ($GITHUB_WORKSPACE, $PWD, $@) intact for runtime expansion.
        envsubst '${TRIVY_IMAGE}' < "${ACTION_PATH}/trivy-wrapper.sh" | sudo tee /usr/local/bin/trivy > /dev/null

        # Make the wrapper executable
        sudo chmod +x /usr/local/bin/trivy
