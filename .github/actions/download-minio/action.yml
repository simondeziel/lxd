name: Download minio/mc
description: Download minio/mc binaries and cache them for the day

inputs:
  token:
    description: Optional GitHub token used to clear older caches
    default: ""
    type: string

runs:
  using: composite
  steps:
    - name: Cache key
      id: cache-key
      shell: bash
      run: |
        set -eux
        echo "ARCH=$(dpkg --print-architecture)" >> $GITHUB_OUTPUT
        echo "DATE=$(date --utc "+%Y%m%d")"      >> $GITHUB_OUTPUT

    - name: Cache minio/mc
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      id: cache-minio
      with:
        path: |
          /home/runner/go/bin/minio
          /home/runner/go/bin/mc
        key: cache-minio-${{ steps.cache-key.outputs.ARCH }}-${{ steps.cache-key.outputs.DATE }}

    - name: Download minio/mc
      if: ${{ steps.cache-minio.outputs.cache-hit != 'true' }}
      env:
        ARCH: ${{ steps.cache-key.outputs.ARCH }}
        GH_TOKEN: ${{ inputs.token }}
      shell: bash
      run: |
        set -eux

        # If a token was provided, use it to clear older caches (using partial
        # cache key) to avoid accumulating dailies for 90 days
        if [ -n "${GH_TOKEN:-}" ]; then
          gh cache delete cache-minio-"${ARCH}"-
        fi

        DIR="/home/runner/go/bin"
        mkdir -p "${DIR}"
        # Download minio ready to include in dependencies for system tests.
        curl -sSfL "https://dl.min.io/server/minio/release/linux-${ARCH}/minio" --output "${DIR}/minio"
        chmod +x "${DIR}/minio"

        # Also grab the latest minio client to maintain compatibility with the server.
        curl -sSfL "https://dl.min.io/client/mc/release/linux-${ARCH}/mc" --output "${DIR}/mc"
        chmod +x "${DIR}/mc"
